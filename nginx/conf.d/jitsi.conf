server {
    listen 80;
    server_name server_name;
    more_set_headers "Server: Microsoft-IIS/10.0";

    if ($http_x_forwarded_proto = "http") {
        return 301 https://$host$request_uri;
    }

    if ($scheme = "http") {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name server_name;
    server_tokens off;
    more_set_headers "Server: Microsoft-IIS/10.0";
    ssl_certificate /opt/cert/fullchain1.pem;
    ssl_certificate_key /opt/cert/privkey1.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    #include snippets/error_pages.conf;

    location /xmpp-websocket {
       proxy_pass http://127.0.0.1:8000/xmpp-websocket;
       proxy_http_version 1.1;
       proxy_set_header Upgrade $http_upgrade;
       proxy_set_header Connection "upgrade";

    }

    location /colibri-ws {
        proxy_pass http://127.0.0.1:8000/colibri-ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

   location / {
      proxy_pass http://127.0.0.1:8000/;
      proxy_http_version 1.1;
   }
}
services:
  timetagger:
    image: ghcr.io/almarklein/timetagger:latest-nonroot
    ports:
      - "127.0.0.1:8001:80"
    volumes:
      - ./_timetagger:/opt/_timetagger
    environment:
      - TIMETAGGER_BIND=0.0.0.0:80
      - TIMETAGGER_DATADIR=/opt/_timetagger
      - TIMETAGGER_LOG_LEVEL=info
      - TIMETAGGER_CREDENTIALS=example@gmail.com:$$2a$$08$$marES6jJRDsdsds1QufDoWr.Zwa7UqsdsdeNJDe3.UKXuHy

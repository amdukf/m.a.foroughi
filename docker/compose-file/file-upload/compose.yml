services:
  file-share:
    build: .
    ports:
      - 127.0.0.1:8080:8080
    volumes:
      - ./uploads:/app/uploads
      - ./shared.txt:/app/shared.txt
    restart: unless-stopped
    user: "1002:1002"
  nginx-upload:
    image: nginx:alpine
    container_name: nginx_upload
    ports:
      - 127.0.0.1:8081:80
    volumes:
      - ./uploads:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
